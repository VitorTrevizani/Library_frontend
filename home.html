<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
     <nav>
        <a href="home.html">Home</a>
        <a href="perfil.html">Perfil</a>
        <a href="">Tell us</a>
    </nav>

    <main>
        <div id="pesquisa">
            <input type="text" id="title">
            <button id="buscar">Buscar</button>
        </div> 
        <div id="div-books">

        </div>
    </main>


    <script>
        const token =  localStorage.getItem("jwt");
        const buttonBuscar = document.getElementById("buscar")
        const pesquisa = document.getElementById("title").value
        const divBooks = document.getElementById("div-books");
    


        async function getBooks (){
            try{
                const res  = await fetch("http://localhost:3000/user/show", {
                    headers:{
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                })
                const books =  await res.json()
                if(res.ok){
                    showBooks(books)
                    
                }else{
                    alert(`Erro ${res.status}: ${books.msg}`)
                }

            }catch(erro){
                alert("Não foi possível carregar os livros. Tente novamente mais tarde!")
                console.log(erro)
            }  
        }

        function showBooks(books){
           divBooks.innerHTML = "";
           for(let i=0; i<books.length; i++){
               const livro = document.createElement("div")
               livro.classList.add('livro')
               const nome = document.createElement("p")
               const autor = document.createElement("p")
               const detailsButton = document.createElement("a")
               detailsButton.href = `detalhes.html?title=${books[i].title}&author=${books[i].author}&totalCopies=${books[i].totalCopies}&availableCopies=${books[i].availableCopies}&bookId=${books[i].id}`
    
               nome.textContent = books[i].title
               nome.style.fontStyle = "italic";
               autor.textContent = books[i].author
              
               detailsButton.textContent = "Detalhes"


               livro.appendChild(nome)
               livro.appendChild(autor)
               livro.appendChild(detailsButton)
               divBooks.appendChild(livro)
           }
        } 

   
        getBooks()



        buttonBuscar.addEventListener("click", async () => {
            try{
                const pesquisa = document.getElementById("title").value
                const res = await fetch(`http://localhost:3000/user/show?title=${pesquisa}`, {
                    headers:{
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                })
                const books = await res.json();
                if(res.ok){
                    showBooks(books)
                    
                }else{
                    alert(`Erro ${res.status}: ${books.msg}`)
                }
            }catch(erro){
                alert("Não foi possível fazer a pesquisa. Tente novamente mais tarde!") 
                console.log(erro)
            }
            
        })
        

    </script>


    </main>
</body>
</html>
