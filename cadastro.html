<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>


    <main>
        <div id="formulario">
            <form action="#" method="post" id="register-form">

                <p>
                    <label for="fname">Nome: </label>
                    <input type="text" name="name" id="fname">
                </p>
                <br>
                <p>
                    <label for="femail">E-mail: </label>
                    <input type="text" name="email" id="femail">
                </p>
                <br>
                <p>
                    <label for="fpassword">Password: </label>
                    <input type="password" name="password" id="fpassword">
                </p>

                <input type="submit" value="Enviar" id="send">

            </form>
        </div>
    </main>

   <script>
       const link = "http://localhost:3000/user/register"
       const send = document.getElementById("send")
       const form = document.getElementById("login-form")

       send.addEventListener("click", async (event) => {
            event.preventDefault()
            const formData = new formData(form)
            const data = Object.entries(formData)
            try{
               const res =  await fetch(link, {
                    method:'post',
                    headers:{
                        "Content-Type": "application/json"
                    },
                    body:JSON.stringify(data)
                })
                const response = await res.json()
                if(res.status = 200){
                    window.location.href = "index.html";
                }else{
                    alert(`Erro ${res.status}: ${response.msg}`)
                }
            }catch(erro){
                alert("Não foi possível fazer o cadastro. Tente novamente mais tarde!")
            }
            
       })

       console.log(res)


      
       
   </script>
</body>
</html>
